<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Vipasha 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Caveat', cursive;
            background: linear-gradient(135deg, #f5e6ff 0%, #ffe6f0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            max-height: 800px;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(156, 39, 176, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Floating decorations */
        .decoration {
            position: absolute;
            font-size: 2rem;
            opacity: 0.6;
            pointer-events: none;
        }

        .decoration.slow {
            animation: float 4s ease-in-out infinite;
        }

        .decoration.medium {
            animation: float 3s ease-in-out infinite;
        }

        .decoration.fast {
            animation: float 2s ease-in-out infinite;
        }

        /* Final Page */
        .final-page {
            background: linear-gradient(135deg, #d8a5ff 0%, #ff88d8 100%);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            text-align: center;
            animation: fadeIn 0.5s ease-in;
            position: relative;
        }

        .final-message {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.2);
            line-height: 1.8;
        }

        /* Audio Control */
        .audio-control {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .audio-control:hover {
            background: #fff;
            transform: scale(1.1);
        }

        .audio-control.playing::before {
            content: "🔊";
            font-size: 1.3rem;
        }

        .audio-control.paused::before {
            content: "🔇";
            font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                max-height: 100vh;
                border-radius: 0;
            }

            .final-message {
                font-size: 1.8rem;
            }

            .audio-control {
                width: 40px;
                height: 40px;
                bottom: 20px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Audio Element - Girls Like You -->
        <audio id="bgAudio" loop crossorigin="anonymous">
            <source src="https://res.cloudinary.com/des7826xg/video/upload/v1780727890/cropped_gly_ddjf2e.mp3" type="audio/mpeg">
        </audio>

        <!-- Audio Control Button -->
        <div class="audio-control playing" id="audioControl"></div>

        <!-- Final Page -->
        <div class="final-page">
            <div class="final-message">
                Wishing you a very happy birthday and a great year ahead! 🎉
            </div>
            <div class="decoration fast" style="top: 15%; left: 8%;">🌸</div>
            <div class="decoration medium" style="bottom: 20%; right: 8%;">🐧</div>
            <div class="decoration slow" style="top: 25%; right: 5%;">🌺</div>
            <div class="decoration medium" style="bottom: 10%; left: 10%;">🦋</div>
        </div>
    </div>

    <script>
        // Audio element
        const bgAudio = document.getElementById('bgAudio');
        const audioControl = document.getElementById('audioControl');
        let isAudioPlaying = true;

        // Start playing audio on page load
        bgAudio.volume = 0.5;
        bgAudio.play().catch(err => {
            console.log('Audio autoplay prevented:', err);
        });

        // Audio control button
        audioControl.addEventListener('click', () => {
            if (isAudioPlaying) {
                bgAudio.pause();
                audioControl.classList.remove('playing');
                audioControl.classList.add('paused');
                isAudioPlaying = false;
            } else {
                bgAudio.play();
                audioControl.classList.add('playing');
                audioControl.classList.remove('paused');
                isAudioPlaying = true;
            }
        });
    </script>
</body>
</html>
